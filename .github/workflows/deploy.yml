name: Deploy dashboard

# The scheduled pipeline routine (see pipeline/orchestration_prompt.md) commits
# freshly-published dashboard/frontend/public/data/*.json and pushes to main.
# That push lands here: build the static sites and deploy to Firebase Hosting +
# Firestore rules. The deploy credential lives only as a GitHub Actions secret
# (Settings > Secrets and variables > Actions > FIREBASE_TOKEN), never a repo file.
#
# Two Hosting sites: `public` (the dashboard) and `admin` (the curator CMS),
# mapped to sites in .firebaserc. The public dashboard + Firestore rules deploy
# on the critical path; the admin site deploys best-effort (continue-on-error)
# so it doesn't block the public deploy until the admin Hosting site has been
# created manually (see docs/admin_cms_setup.md).
on:
  push:
    branches: [main]
    paths:
      - "dashboard/frontend/**"
      - "dashboard/admin/**"
      - "firestore.rules"
      - "firebase.json"
      - ".github/workflows/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            dashboard/frontend/package-lock.json
            dashboard/admin/package-lock.json

      - name: Build public dashboard
        working-directory: dashboard/frontend
        run: |
          npm ci
          npm run build

      - name: Install Firebase CLI and check token
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN secret is not set — see Settings > Secrets and variables > Actions." >&2
            exit 1
          fi
          npm install -g firebase-tools

      - name: Deploy public dashboard + Firestore rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting:public,firestore:rules --project admissions-intelligence-2fc32 --token "$FIREBASE_TOKEN"

      # The admin app is entirely best-effort and must NEVER block the public
      # deploy above. Both its build AND deploy run after the public deploy has
      # already completed, both with continue-on-error, and the deploy is gated
      # on the build succeeding -- so an admin build failure (broken dep, or the
      # admin Hosting site not yet created) can't halt the job before the public
      # dashboard is live.
      - name: Build admin app
        id: build_admin
        continue-on-error: true
        working-directory: dashboard/admin
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: admissions-intelligence-2fc32.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: admissions-intelligence-2fc32
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          npm ci
          npm run build

      - name: Deploy admin app (best-effort until the admin Hosting site exists)
        if: steps.build_admin.outcome == 'success'
        continue-on-error: true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --only hosting:admin --project admissions-intelligence-2fc32 --token "$FIREBASE_TOKEN"
