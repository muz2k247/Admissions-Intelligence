name: Pipeline — scrape, classify, extract, publish

# Runs the full 5-stage data pipeline.
# Stage 3 (classification + field extraction) calls the Gemini API directly
# via pipeline/gemini_classify.py and pipeline/gemini_extract.py.
#
# Pushing new data under dashboard/frontend/public/data/** triggers the
# existing deploy.yml workflow to build and deploy to Firebase Hosting.
#
# Deliberately NO `schedule:` trigger of its own (Phase S): the curator's
# cadence is entirely admin-CMS-configured (settings/pipeline_schedule in
# Firestore) and enforced by tick.yml, which is the only thing that decides
# when to dispatch this workflow automatically. A hardcoded cron here
# alongside that would silently keep firing regardless of what the curator
# configures in the CMS -- e.g. "manual only" would still get an uncontrolled
# weekly run -- defeating the entire point of Phase S. Do not re-add one.
#
# Manual trigger: Actions tab → "Pipeline" → "Run workflow" button.
# Also dispatched automatically by tick.yml, per the curator's admin-CMS-
# configured schedule (see pipeline/schedule_gate.py) or a "Run Now" request.

on:
  workflow_dispatch: {}   # Manual trigger + tick.yml's automated dispatch

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    # published_sha is the commit the "Commit and push" step actually pushed
    # (or, on a no-op run, the commit already checked out). The `deploy` job
    # below passes this to deploy.yml explicitly -- a reusable workflow's
    # checkout otherwise defaults to the *outer* run's github.sha, which is
    # frozen at workflow_dispatch time and does NOT advance when this job
    # pushes a new commit mid-run. Without this, `deploy` silently redeploys
    # the commit that existed before this run started, one cycle stale --
    # e.g. needs_review.json missing from the live site the very run it was
    # first introduced. See Phase T Task 1.4.
    outputs:
      published_sha: ${{ steps.publish.outputs.sha }}
      changed: ${{ steps.publish.outputs.changed }}
    # Backstop against concurrent runs (Phase S): the tick workflow
    # (tick.yml) already checks GitHub's run history before dispatching,
    # but this native concurrency group guarantees it even if a manual
    # dispatch races a scheduled/tick-triggered one. Queues rather than
    # cancels -- a racing duplicate trigger runs after the first finishes
    # instead of cutting off an in-progress publish.
    concurrency:
      group: admissions-pipeline
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Only install the Playwright browser if a source needs JS rendering.
          if grep -q "render: js" config/institutions.yaml; then
            playwright install chromium
          fi

      - name: 'Stage 1-2: Scrape + Chunk'
        run: python -m pipeline.run_full stage1_2 --out-scraped .tmp/scraped --out-chunks .tmp/chunks/chunks.json

      - name: 'Stage 3a: Classify via Gemini'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python pipeline/gemini_classify.py --chunks .tmp/chunks/chunks.json --out .tmp/chunks/classified.json

      - name: 'Stage 3b: Extract fields via Gemini (best-effort)'
        id: gemini_extract
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python pipeline/gemini_extract.py --chunks .tmp/chunks/chunks.json --out .tmp/chunks/llm_fields.json

      - name: Report Gemini extraction health
        if: always()
        run: |
          if [ "${{ steps.gemini_extract.outcome }}" != "success" ]; then
            echo "### :warning: Gemini field extraction failed this run" >> "$GITHUB_STEP_SUMMARY"
            echo "Stage 4 will fall back to the regex extractor for every chunk. Check the GEMINI_API_KEY secret and Gemini API quota/status." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Gemini field extraction: OK" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: 'Stage 4: Extraction build'
        run: python -m pipeline.run_full stage4 --out-scraped .tmp/scraped --classified .tmp/chunks/classified.json --llm-extracted .tmp/chunks/llm_fields.json --out .tmp/extracted

      - name: 'Stage 5: Publish static data'
        run: python -m pipeline.run_full stage5 --extracted .tmp/extracted

      - name: Finalize health.json
        # Runs even after an earlier step failed (a crashed scrape, a
        # refused publish) -- health.json is the durable record of what
        # happened on EVERY run, not just successful ones (Phase T Task 4).
        # Each stage above already called pipeline.health.record_stage()
        # into .tmp/health/run_health.json as it ran; this derives the
        # overall published/publish_refused/failed status from whichever
        # sections got that far and writes the 4th static file.
        if: always()
        run: python -m pipeline.health finalize --publish-dir dashboard/frontend/public/data

      - name: Commit and push if data changed
        id: publish
        # if: always() so a crashed/refused run still commits and publishes
        # its health.json -- see the Finalize health step above. On such a
        # run, health.json is the only file that changed; records.json/
        # institutions.json/needs_review.json are untouched because the
        # stage that would have written them never got that far (or
        # stage 5 itself refused, in which case _write_json_files_atomic
        # never ran and those files are still exactly what the previous
        # successful run published).
        if: always()
        run: |
          git config user.name "Admissions Intelligence Pipeline"
          git config user.email "pipeline@admissions-intelligence.local"
          # --autostash: stage 5 (and health finalize) have already written
          # modified tracked files to the working tree by this point, and a
          # plain `git pull --rebase` refuses to start at all with a dirty
          # tree -- not because of any real upstream divergence, just
          # ordering. --autostash stashes those changes, rebases, then pops
          # the stash back so they're staged/committed normally below.
          #
          # Still guarded: a failed/conflicting rebase must not abort this
          # step outright (the shell's default set -e would otherwise skip
          # straight past git add/commit/push AND the echo ... >>$GITHUB_OUTPUT
          # lines below, silently losing this run's published_sha/changed
          # outputs -- exactly the crashed-run case this if: always() step
          # exists to cover). A genuine conflict is rare (these paths are
          # pipeline-owned and this job holds the admissions-pipeline
          # concurrency group), but "rare" isn't "never". On failure, abort
          # back to a clean tree (git rebase --abort restores the autostash
          # automatically) and proceed with the local commit as the base; a
          # genuine divergence then surfaces as a `git push` failure below
          # instead, which is no worse than this step's pre-existing
          # (unguarded) push failure mode.
          if ! git pull --rebase --autostash origin main; then
            git rebase --abort 2>/dev/null || true
            echo "WARN: git pull --rebase failed; proceeding without rebasing onto origin/main."
          fi
          # Add every file stage 5 publishes, by explicit name. needs_review.json
          # was previously omitted, so it never reached the deployed site -- the
          # admin CMS's Needs Review tab fetched a missing path that the SPA
          # rewrite served as index.html, throwing "Unexpected token '<'". It
          # also skewed stage 5's coverage-guard baseline (a fresh CI checkout
          # loaded needs_review.json as [], undercounting the previous run).
          # Explicit filenames (not `git add <dir>/`) so a mid-write crash can't
          # commit orphaned *.tmp files from _write_json_files_atomic.
          git add dashboard/frontend/public/data/records.json \
                  dashboard/frontend/public/data/institutions.json \
                  dashboard/frontend/public/data/needs_review.json \
                  dashboard/frontend/public/data/health.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping push."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: publish pipeline data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  deploy:
    needs: pipeline
    # Deploy when data actually changed (the common case), OR when the
    # pipeline job itself failed/was refused -- so a crashed/refused run's
    # health.json still reaches the live site for the admin CMS's Pipeline
    # tab to show, even in the edge case where `changed` somehow didn't come
    # back 'true'. Deliberately NOT a blanket always(): CLAUDE.md's cost-
    # minimization constraint applies to CI/Firebase-deploy minutes too, and
    # a genuine no-op run (nothing published, pipeline job succeeded outright)
    # has nothing new to deploy -- redeploying the same live commit on every
    # such tick would be pure waste for no observability gain. (Task 1.4's
    # published_sha output already handles the empty-string edge case if the
    # pipeline job dies before the commit step ever ran: an empty
    # needs.pipeline.outputs.published_sha is falsy in GitHub Actions
    # expressions, so deploy.yml's `ref: ${{ inputs.ref || github.sha }}`
    # falls back to the dispatch-time commit -- an idempotent, safe redeploy
    # of the pre-run tree.)
    # always() && (...) -- not just the bare boolean expression -- because a
    # job's default (unspecified) `if:` is implicitly ANDed with success():
    # without always() here, a failed `pipeline` job would skip `deploy`
    # outright before this expression is even evaluated, defeating the
    # `needs.pipeline.result == 'failure'` clause entirely.
    if: always() && (needs.pipeline.outputs.changed == 'true' || needs.pipeline.result == 'failure')
    uses: ./.github/workflows/deploy.yml
    with:
      ref: ${{ needs.pipeline.outputs.published_sha }}
    secrets: inherit
