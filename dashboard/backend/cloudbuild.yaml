# Cloud Build configuration for deploying FastAPI backend to Cloud Run
# Triggered on push to main branch (configure in Google Cloud Console)
#
# Set these as Cloud Build substitutions or secrets:
# - _CLOUD_RUN_SERVICE: admissions-api (or your service name)
# - _CLOUD_RUN_REGION: us-central1 (or your preferred region)
# - _FIREBASE_PROJECT_ID: admissions-intelligence-2fc32
#
# Also set as Cloud Build secrets (encrypted):
# - FIREBASE_SERVICE_ACCOUNT_KEY_JSON: Base64-encoded service account JSON

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_CLOUD_RUN_SERVICE}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_CLOUD_RUN_SERVICE}:latest'
      - '-f'
      - 'dashboard/backend/Dockerfile'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_CLOUD_RUN_SERVICE}:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run
  # (gke-deploy is a GKE-targeted builder, not valid for Cloud Run -- use the
  # standard gcloud builder with `run deploy` instead)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_CLOUD_RUN_SERVICE}'
      - '--image=gcr.io/$PROJECT_ID/${_CLOUD_RUN_SERVICE}:$SHORT_SHA'
      - '--platform=managed'
      - '--region=${_CLOUD_RUN_REGION}'
      - '--set-env-vars=FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}'
      - '--set-secrets=FIREBASE_SERVICE_ACCOUNT_KEY_JSON=FIREBASE_SERVICE_ACCOUNT_KEY_JSON:latest'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/${_CLOUD_RUN_SERVICE}:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/${_CLOUD_RUN_SERVICE}:latest'

substitutions:
  _CLOUD_RUN_SERVICE: 'admissions-api'
  _CLOUD_RUN_REGION: 'us-central1'
  _FIREBASE_PROJECT_ID: 'admissions-intelligence-2fc32'

# NOTE: trigger this build via a Cloud Build Trigger resource configured in
# Google Cloud Console (Cloud Build > Triggers), pointed at this repo's main
# branch -- `onPush:` is not a valid top-level cloudbuild.yaml key, triggers
# are external resources, not declared inline here.

timeout: '1800s'
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
